<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PR Property Analyzer</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #07070f; color: #e0e0f0; font-family: monospace; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }
  select option { background: #0d0d18; color: #e0e0f0; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0a0a14; }
  ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const fmt = (n) => new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n || 0);
const fmtD = (n) => new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", minimumFractionDigits: 2 }).format(n || 0);
const fmtPct = (n) => `${(n || 0).toFixed(2)}%`;

const calcPI = (principal, rate, years) => {
  if (!principal || !rate || !years) return 0;
  const r = rate / 100 / 12;
  const n = years * 12;
  if (r === 0) return principal / n;
  return (principal * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
};

function calcClosingCosts(precio, prontoDlr, hipoteca, tipoH) {
  const items = [];
  const notarioFee = precio <= 150000 ? precio * 0.01 : 150000 * 0.01 + (precio - 150000) * 0.005;
  items.push({ cat: "Legal & Notarial", label: "Honorarios Notario/Abogado", amount: notarioFee, note: "1% ≤$150k / 0.5% resto" });
  const registryFee = precio <= 25000 ? 50 : 50 + Math.ceil((precio - 25000) / 1000) * 4;
  items.push({ cat: "Gobierno PR", label: "Registro de la Propiedad", amount: registryFee, note: "$50 + $4 x $1k adicional" });
  items.push({ cat: "Gobierno PR", label: "Sello Rentas Internas", amount: Math.round(precio / 2) / 100 + 1, note: "Precio/2 + $1" });
  const legalStamp = Math.ceil(precio / 50000) * 5;
  items.push({ cat: "Gobierno PR", label: "Sello Asistencia Legal", amount: Math.round(legalStamp / 2), note: "$5 x cada $50k" });
  items.push({ cat: "Gobierno PR", label: "Sello Notarial", amount: 1, note: "Fijo $1.00" });
  items.push({ cat: "Gobierno PR", label: "Electronic Filing Fee (ARPE)", amount: 20, note: "Fijo" });
  items.push({ cat: "Título & Seguro", label: "Title Insurance (Loan Policy)", amount: hipoteca * 0.004, note: "~0.4% del préstamo" });
  items.push({ cat: "Título & Seguro", label: "Estudio de Título", amount: 350, note: "Estimado fijo" });
  items.push({ cat: "Banco / Préstamo", label: "Tasación (Appraisal)", amount: 450, note: "$350-$600 típico en PR" });
  items.push({ cat: "Banco / Préstamo", label: "Origination Fee", amount: hipoteca * 0.0075, note: "~0.75% del préstamo" });
  items.push({ cat: "Banco / Préstamo", label: "Reporte de Crédito", amount: 65, note: "Estimado fijo" });
  items.push({ cat: "Banco / Préstamo", label: "Underwriting Fee", amount: 650, note: "Estimado fijo" });
  items.push({ cat: "Prepagados (Escrow)", label: "Seguro de Hogar Prepagado (2 meses)", amount: precio * 0.0055 / 12 * 2, note: "~0.55%/año × 2 meses" });
  items.push({ cat: "Prepagados (Escrow)", label: "CRIM Prepagado (2 meses)", amount: precio * 0.0083 / 12 * 2, note: "~1% anual × 2 meses" });
  if (tipoH === "FHA") items.push({ cat: "Seguro Gubernamental", label: "FHA Upfront MIP (UFMIP)", amount: hipoteca * 0.0175, note: "1.75% — puede financiarse" });
  if (tipoH === "VA") items.push({ cat: "Seguro Gubernamental", label: "VA Funding Fee", amount: hipoteca * 0.0215, note: "2.15% primera vez" });
  if (tipoH === "USDA") items.push({ cat: "Seguro Gubernamental", label: "USDA Guarantee Fee", amount: hipoteca * 0.01, note: "1% del préstamo" });
  const total = items.reduce((s, i) => s + i.amount, 0);
  return { items, total };
}

const baseInp = { background: "#0d0d18", border: "1px solid #252535", borderRadius: 7, color: "#e0e0f0", fontSize: 14, padding: "9px 10px", width: "100%", outline: "none", fontFamily: "monospace", fontWeight: 600, boxSizing: "border-box" };
const lblStyle = { fontSize: 10, color: "#6a6a8a", letterSpacing: "0.09em", textTransform: "uppercase", display: "block", marginBottom: 5 };

function Field({ label, val, set, pre = "$", suf = "", note, small }) {
  return (
    <div style={{ marginBottom: small ? 8 : 12 }}>
      <label style={lblStyle}>{label}{note && <span style={{ color: "#f59e0b", marginLeft: 5, fontSize: 9 }}>★ {note}</span>}</label>
      <div style={{ display: "flex", alignItems: "center", background: "#0d0d18", border: "1px solid #252535", borderRadius: 7, overflow: "hidden" }}>
        {pre && <span style={{ padding: "0 8px", color: "#454565", fontSize: 12 }}>{pre}</span>}
        <input type="number" value={val} onChange={e => set && set(parseFloat(e.target.value) || 0)}
          style={{ ...baseInp, border: "none", borderRadius: 0, padding: "9px 6px" }} />
        {suf && <span style={{ padding: "0 8px", color: "#454565", fontSize: 12 }}>{suf}</span>}
      </div>
    </div>
  );
}

function StatBox({ label, val, color }) {
  return (
    <div style={{ background: "#0a0a12", border: `1px solid ${color}25`, borderRadius: 8, padding: "8px 10px" }}>
      <p style={{ fontSize: 8, color: "#4a4a6a", marginBottom: 3, letterSpacing: "0.08em", textTransform: "uppercase" }}>{label}</p>
      <p style={{ fontSize: 12, fontWeight: 800, color }}>{val}</p>
    </div>
  );
}

function Card({ label, val, sub, color = "#f59e0b", badge, size = "md" }) {
  return (
    <div style={{ background: "#0d0d18", border: `1px solid ${color}30`, borderRadius: 12, padding: size === "lg" ? "18px 20px" : "13px 15px", flex: 1 }}>
      <p style={{ fontSize: 9, color: "#5a5a7a", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 6 }}>{label}</p>
      <p style={{ fontSize: size === "lg" ? 22 : 18, fontWeight: 900, color, fontFamily: "monospace", lineHeight: 1 }}>{val}</p>
      {sub && <p style={{ fontSize: 10, color: "#4a4a6a", marginTop: 5 }}>{sub}</p>}
      {badge && <span style={{ display: "inline-block", marginTop: 6, background: `${color}20`, color, fontSize: 9, padding: "2px 8px", borderRadius: 20 }}>{badge}</span>}
    </div>
  );
}

function Sec({ title, icon, children }) {
  return (
    <div style={{ marginBottom: 20 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
        <span>{icon}</span>
        <span style={{ fontSize: 11, color: "#b0b0d0", letterSpacing: "0.12em", textTransform: "uppercase", fontWeight: 700 }}>{title}</span>
        <div style={{ flex: 1, height: 1, background: "#1e1e2e" }} />
      </div>
      {children}
    </div>
  );
}

function ERow({ label, val, set, pct, pr }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 95px 55px", gap: 6, marginBottom: 7, alignItems: "center" }}>
      <span style={{ fontSize: 11, color: "#6a6a8a" }}>{label}{pr && <span style={{ color: "#f59e0b", fontSize: 9, marginLeft: 4 }}>PR</span>}</span>
      <div style={{ display: "flex", background: "#0a0a14", border: "1px solid #1e1e2e", borderRadius: 6, alignItems: "center" }}>
        <span style={{ padding: "0 5px", color: "#3a3a5a", fontSize: 11 }}>$</span>
        <input type="number" value={val} onChange={e => set(parseFloat(e.target.value) || 0)}
          style={{ background: "transparent", border: "none", outline: "none", color: "#c8c8e8", fontSize: 12, padding: "6px 3px", width: "100%", fontFamily: "monospace" }} />
      </div>
      <div style={{ background: "#080810", border: "1px solid #1a1a2a", borderRadius: 6, padding: "6px 4px", textAlign: "center" }}>
        <span style={{ fontSize: 9, color: "#4a4a6a" }}>{(pct || 0).toFixed(1)}%</span>
      </div>
    </div>
  );
}

const catColors = { "Legal & Notarial": "#a78bfa", "Gobierno PR": "#f59e0b", "Título & Seguro": "#60a5fa", "Banco / Préstamo": "#34d399", "Prepagados (Escrow)": "#fb923c", "Seguro Gubernamental": "#f87171" };

function App() {
  const [tab, setTab] = useState("data");
  const [precio, setPrecio] = useState(0);
  const [pronto, setPronto] = useState(0);
  const [plazo, setPlazo] = useState(0);
  const [tasa, setTasa] = useState(0);
  const [tipoH, setTipoH] = useState("Convencional");
  const [reparaciones, setReparaciones] = useState(0);
  const [mesCompra, setMesCompra] = useState(0);
  const [anoCompra, setAnoCompra] = useState(0);
  const [renta1, setRenta1] = useState(0);
  const [renta2, setRenta2] = useState(0);
  const [renta3, setRenta3] = useState(0);
  const [units, setUnits] = useState(1);
  const [crim, setCrim] = useState(0);
  const [seguro, setSeguro] = useState(0);
  const [huracan, setHuracan] = useState(0);
  const [inundacion, setInundacion] = useState(0);
  const [hoa, setHoa] = useState(0);
  const [agua, setAgua] = useState(0);
  const [elec, setElec] = useState(0);
  const [internet, setInternet] = useState(0);
  const [basura, setBasura] = useState(0);
  const [jardineria, setJardineria] = useState(0);
  const [admin, setAdmin] = useState(0);
  const [mant, setMant] = useState(0);
  const [vacancia, setVacancia] = useState(0);
  const [extra, setExtra] = useState(0);
  const [precioVenta, setPrecioVenta] = useState(0);
  const [comisionAgente, setComisionAgente] = useState(0);
  const [cierreVentaDlr, setCierreVentaDlr] = useState(0);
  const [deudaHipoteca, setDeudaHipoteca] = useState(0);
  const [apreciacion, setApreciacion] = useState(0);
  const [horizonte, setHorizonte] = useState(0);

  // ── ESCROW EDITABLES (PITI) ──
  const [escrowSeguroHogarEdit, setEscrowSeguroHogarEdit] = useState(0);
  const [escrowCRIMEdit, setEscrowCRIMEdit] = useState(0);
  const [escrowHuracanEdit, setEscrowHuracanEdit] = useState(0);
  const [escrowInundacionEdit, setEscrowInundacionEdit] = useState(0);
  const [escrowMIPEdit, setEscrowMIPEdit] = useState(0);

  const [saved, setSaved] = useState([]);
  const [propName, setPropName] = useState("Mi Propiedad");

  const c = useMemo(() => {
    const prontoDlr = precio * pronto / 100;
    const hipoteca = precio - prontoDlr;
    const cc = calcClosingCosts(precio, prontoDlr, hipoteca, tipoH);
    const capitalTotal = prontoDlr + cc.total + reparaciones;
    const pAndI = calcPI(hipoteca, tasa, plazo);
    const pmiMonthly = (tipoH === "Convencional" && pronto < 20) ? hipoteca * 0.0055 / 12 : 0;
    const fhaMipMonthly = tipoH === "FHA" ? hipoteca * 0.0055 / 12 : 0;
    const usdaMonthly = tipoH === "USDA" ? hipoteca * 0.0035 / 12 : 0;

    // Escrow: usa valor editado si > 0, si no usa estimado PR realista
    const escrowSeguroHogar = escrowSeguroHogarEdit > 0 ? escrowSeguroHogarEdit : Math.round(precio * 0.009 / 12);   // ~0.9%/año
    const escrowCRIM        = escrowCRIMEdit > 0        ? escrowCRIMEdit        : Math.round(precio * 0.0083 / 12); // ~1%/año
    const escrowHuracan     = escrowHuracanEdit > 0     ? escrowHuracanEdit     : Math.round(precio * 0.02 / 12);   // ~2%/año (PR post-María)
    const escrowInundacion  = escrowInundacionEdit > 0  ? escrowInundacionEdit  : 0;                                // 0 hasta que usuario ingrese
    const escrowMIP         = escrowMIPEdit > 0         ? escrowMIPEdit         : fhaMipMonthly + pmiMonthly + usdaMonthly;
    const pagoTotalMensual  = pAndI + escrowSeguroHogar + escrowCRIM + escrowHuracan + escrowInundacion + escrowMIP;
    const rentaBruta = renta1 + renta2 + renta3;
    const rentaAnual = rentaBruta * 12;
    const gastos = crim + seguro + huracan + inundacion + hoa + pmiMonthly + fhaMipMonthly + usdaMonthly + agua + elec + internet + basura + jardineria + admin + mant + vacancia + extra;
    const noim = rentaBruta - gastos;
    const noia = noim * 12;
    const capRate = precio > 0 ? noia / precio * 100 : 0;
    const cfm = noim - pAndI;
    const cfa = cfm * 12;
    const coc = capitalTotal > 0 ? cfa / capitalTotal * 100 : 0;
    const pctGastos = rentaBruta > 0 ? gastos / rentaBruta * 100 : 0;
    const dscr = pAndI > 0 ? noim / pAndI : 0;
    const grm = rentaAnual > 0 ? precio / rentaAnual : 0;
    const r50 = gastos <= rentaBruta * 0.5;
    const r1 = rentaBruta >= precio * 0.01;
    const p = (v) => rentaBruta > 0 ? v / rentaBruta * 100 : 0;
    let balanceRestante = hipoteca;
    let pagosMensualesRealizados = 0;
    if (mesCompra > 0 && anoCompra > 0) {
      const fechaInicio = new Date(anoCompra, mesCompra - 1, 1);
      const hoy = new Date();
      const meses = Math.max(0, (hoy.getFullYear() - fechaInicio.getFullYear()) * 12 + (hoy.getMonth() - fechaInicio.getMonth()));
      pagosMensualesRealizados = Math.min(meses, plazo * 12);
      const r = tasa / 100 / 12;
      const n = plazo * 12;
      if (r > 0 && pagosMensualesRealizados > 0) {
        balanceRestante = Math.max(hipoteca * (Math.pow(1 + r, n) - Math.pow(1 + r, pagosMensualesRealizados)) / (Math.pow(1 + r, n) - 1), 0);
      }
    }
    const tieneHistorial = mesCompra > 0 && anoCompra > 0;
    const equityAcumulado = hipoteca - balanceRestante;
    return { prontoDlr, hipoteca, capitalTotal, pAndI, pagoTotalMensual, escrowSeguroHogar, escrowCRIM, escrowHuracan, escrowInundacion, escrowMIP, pmiMonthly, fhaMipMonthly, usdaMonthly, rentaBruta, rentaAnual, gastos, gastosAnual: gastos * 12, noim, noia, capRate, cfm, cfa, coc, pctGastos, dscr, grm, r50, r1, p, cc, cierreDlr: cc.total, balanceRestante, pagosMensualesRealizados, tieneHistorial, equityAcumulado };
  }, [precio, pronto, plazo, tasa, tipoH, reparaciones, mesCompra, anoCompra, escrowSeguroHogarEdit, escrowCRIMEdit, escrowHuracanEdit, escrowInundacionEdit, escrowMIPEdit, renta1, renta2, renta3, crim, seguro, huracan, inundacion, hoa, agua, elec, internet, basura, jardineria, admin, mant, vacancia, extra]);
  }, [precio, pronto, plazo, tasa, tipoH, reparaciones, mesCompra, anoCompra, renta1, renta2, renta3, crim, seguro, huracan, inundacion, hoa, agua, elec, internet, basura, jardineria, admin, mant, vacancia, extra]);

  useEffect(() => { setDeudaHipoteca(Math.round(c.balanceRestante)); }, [c.balanceRestante]);
  useEffect(() => { setCierreVentaDlr(Math.round(c.cc.total)); }, [c.cc.total]);

  const rv = useMemo(() => {
    const comisionDlr = precioVenta * comisionAgente / 100;
    const gananciaNetaHoy = precioVenta - comisionDlr - cierreVentaDlr - deudaHipoteca;
    const r = tasa / 100 / 12;
    let balance = c.balanceRestante;
    let cumCF = 0, cumEquity = 0;
    const yearlyData = [];
    for (let yr = 1; yr <= Math.max(horizonte, 1); yr++) {
      for (let m = 0; m < 12; m++) {
        const interest = balance * r;
        const principal = Math.max(c.pAndI - interest, 0);
        cumEquity += principal;
        balance = Math.max(balance - principal, 0);
        cumCF += c.cfm;
      }
      const valorAño = precio * Math.pow(1 + apreciacion / 100, yr);
      const gananciaVenta = valorAño - (valorAño * comisionAgente / 100) - cierreVentaDlr - balance;
      yearlyData.push({ yr, cumCF: Math.round(cumCF), cumEquity: Math.round(cumEquity), valorAño: Math.round(valorAño), balance: Math.round(balance), gananciaVenta: Math.round(gananciaVenta), totalRenta: Math.round(cumCF + cumEquity + (valorAño - precio)) });
    }
    const last = yearlyData[yearlyData.length - 1] || {};
    const winner = (last.totalRenta || 0) >= (last.gananciaVenta || 0) ? "renta" : "venta";
    return { comisionDlr, gananciaNetaHoy, yearlyData, totalReturnRenta: last.totalRenta || 0, totalReturnVenta: last.gananciaVenta || 0, winner, last };
  }, [precioVenta, comisionAgente, cierreVentaDlr, deudaHipoteca, apreciacion, horizonte, c, precio, tasa]);

  const sc = (v) => v >= 10 ? "#22c55e" : v >= 5 ? "#f59e0b" : "#ef4444";
  const cfColor = c.cfm >= 0 ? "#22c55e" : "#ef4444";
  const hNotes = { Convencional: "≥20% evita PMI. Sin seguro gubernamental.", FHA: "Mín 3.5% pronto. MIP 1.75% upfront + 0.55%/año.", VA: "Sin pronto. Solo veteranos. Sin PMI mensual.", USDA: "Zonas rurales PR. 0% pronto. Guarantee fee 1%." };
  const tabs = [{ id: "data", label: "🏠 Data de Propiedad" }, { id: "rentaventa", label: "⚖️ Renta vs Venta" }, { id: "comparar", label: `💾 Guardados (${saved.length})` }, { id: "guia", label: "📋 Guía PR" }];
  const ccByCategory = useMemo(() => { const g = {}; c.cc.items.forEach(i => { if (!g[i.cat]) g[i.cat] = []; g[i.cat].push(i); }); return g; }, [c.cc.items]);

  return (
    <div style={{ minHeight: "100vh", background: "#07070f", color: "#e0e0f0", fontFamily: "monospace", fontSize: 13 }}>
      {/* HEADER */}
      <div style={{ background: "#0c0c18", borderBottom: "1px solid #1a1a2a", padding: "14px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
        <div>
          <h1 style={{ fontSize: 17, fontWeight: 900, color: "#f59e0b", margin: 0 }}>🏠 PR PROPERTY ANALYZER</h1>
          <p style={{ fontSize: 9, color: "#4a4a6a", marginTop: 2, letterSpacing: "0.1em" }}>ANÁLISIS DE INVERSIÓN · PUERTO RICO</p>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <input value={propName} onChange={e => setPropName(e.target.value)} style={{ ...baseInp, width: 150, fontSize: 12, padding: "7px 12px" }} placeholder="Nombre propiedad" />
          <button onClick={() => setSaved(s => [...s, { name: propName, precio, c, date: new Date().toLocaleDateString("es-PR") }])}
            style={{ background: "#f59e0b", color: "#07070f", border: "none", borderRadius: 7, padding: "8px 14px", fontSize: 11, fontWeight: 900, cursor: "pointer" }}>💾 GUARDAR</button>
        </div>
      </div>

      {/* TABS */}
      <div style={{ borderBottom: "1px solid #1a1a2a", padding: "0 20px", display: "flex", overflowX: "auto" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            style={{ background: "none", border: "none", borderBottom: `2px solid ${tab === t.id ? "#f59e0b" : "transparent"}`, color: tab === t.id ? "#f59e0b" : "#5a5a7a", padding: "11px 16px", fontSize: 11, cursor: "pointer", fontWeight: 700, letterSpacing: "0.07em", textTransform: "uppercase", whiteSpace: "nowrap" }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ══ DATA DE PROPIEDAD ══ */}
      {tab === "data" && (
        <div style={{ maxWidth: 1200, margin: "0 auto", padding: 20, display: "grid", gridTemplateColumns: "320px 1fr", gap: 20 }}>
          <div>
            <Sec title="Información de Compra" icon="🏷️">
              <Field label="Precio de Compra" val={precio} set={setPrecio} />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                <Field label="Pronto %" val={pronto} set={setPronto} pre="%" small />
                <div style={{ marginBottom: 8 }}>
                  <label style={lblStyle}>= Pronto $</label>
                  <div style={{ ...baseInp, color: "#f59e0b", cursor: "default", padding: "9px 10px", background: "#08080f", border: "1px solid #1a1a28" }}>{fmt(c.prontoDlr)}</div>
                </div>
              </div>
              <div style={{ borderTop: "1px solid #1a1a2a", paddingTop: 12, marginTop: 4, marginBottom: 4 }}>
                <p style={{ fontSize: 9, color: "#f59e0b", fontWeight: 700, letterSpacing: "0.1em", marginBottom: 8 }}>FECHA DE COMPRA <span style={{ color: "#3a3a5a", fontWeight: 400 }}>— OPCIONAL</span></p>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  <div>
                    <label style={lblStyle}>Mes de Compra</label>
                    <select value={mesCompra} onChange={e => setMesCompra(parseInt(e.target.value))} style={{ ...baseInp, padding: "9px 10px", cursor: "pointer" }}>
                      <option value={0}>— No aplica —</option>
                      {["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"].map((m, i) => <option key={i+1} value={i+1}>{m}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={lblStyle}>Año de Compra</label>
                    <select value={anoCompra} onChange={e => setAnoCompra(parseInt(e.target.value))} style={{ ...baseInp, padding: "9px 10px", cursor: "pointer" }}>
                      <option value={0}>— No aplica —</option>
                      {Array.from({ length: 31 }, (_, i) => 2000 + i).reverse().map(y => <option key={y} value={y}>{y}</option>)}
                    </select>
                  </div>
                </div>
                {c.tieneHistorial && (
                  <div style={{ marginTop: 10, background: "#0a0f1a", border: "1px solid #60a5fa30", borderRadius: 8, padding: "10px 12px" }}>
                    <p style={{ fontSize: 9, color: "#5a7a9a", marginBottom: 8 }}>HISTORIAL DE PAGOS</p>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>

            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {[{ label: "Regla del 50%", pass: c.r50, desc: `Gastos ${fmtPct(c.pctGastos)} de renta. Límite: ${fmtD(c.rentaBruta * 0.5)}/mes` }, { label: "Regla del 1%", pass: c.r1, desc: `Renta ${fmtD(c.rentaBruta)}/mes vs 1% precio = ${fmtD(precio * 0.01)}/mes` }].map(({ label, pass, desc }) => (
                <div key={label} style={{ background: "#0d0d18", border: `1px solid ${pass ? "#22c55e30" : "#ef444430"}`, borderRadius: 10, padding: "12px 16px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 5 }}>
                    <span style={{ width: 7, height: 7, borderRadius: "50%", background: pass ? "#22c55e" : "#ef4444", boxShadow: `0 0 6px ${pass ? "#22c55e" : "#ef4444"}`, display: "block" }} />
                    <span style={{ fontSize: 11, fontWeight: 700, color: pass ? "#22c55e" : "#ef4444" }}>{label} — {pass ? "✓ CUMPLE" : "✗ NO CUMPLE"}</span>
                  </div>
                  <p style={{ fontSize: 10, color: "#5a5a7a" }}>{desc}</p>
                </div>
              ))}
            </div>
          </Sec>

          <div style={{ height: 1, background: "#1a1a2a", margin: "4px 0 20px" }} />

          <div style={{ display: "flex", justifyContent: "center", marginBottom: 20 }}>
            <div style={{ background: rv.winner === "renta" ? "#0a1a0a" : "#1a1a0a", border: `2px solid ${rv.winner === "renta" ? "#22c55e" : "#f59e0b"}`, borderRadius: 14, padding: "16px 48px", textAlign: "center" }}>
              <p style={{ fontSize: 10, color: "#5a5a7a", letterSpacing: "0.12em", marginBottom: 6 }}>ESTRATEGIA GANADORA EN {horizonte} AÑOS</p>
              <p style={{ fontSize: 22, fontWeight: 900, color: rv.winner === "renta" ? "#22c55e" : "#f59e0b" }}>{rv.winner === "renta" ? "🏠 RENTAR" : "💵 VENDER"}</p>
              <p style={{ fontSize: 11, color: "#5a5a7a", marginTop: 4 }}>Diferencia: {fmt(Math.abs(rv.totalReturnRenta - rv.totalReturnVenta))} a favor de {rv.winner === "renta" ? "rentar" : "vender"}</p>
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 20 }}>
            <div style={{ background: "#090f09", border: "2px solid #22c55e40", borderRadius: 14, padding: "20px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}><span style={{ fontSize: 18 }}>🏠</span><h3 style={{ fontSize: 14, fontWeight: 900, color: "#22c55e", margin: 0 }}>RENTAR</h3><span style={{ fontSize: 10, background: "#22c55e20", color: "#22c55e", padding: "2px 10px", borderRadius: 20 }}>{horizonte} años</span></div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 14 }}>
                {[["Cashflow Mensual", fmtD(c.cfm), c.cfm >= 0 ? "#22c55e" : "#ef4444"], ["Cashflow Anual", fmt(c.cfa), c.cfm >= 0 ? "#22c55e" : "#ef4444"], [`Cashflow ${horizonte} años`, fmt(rv.last.cumCF || 0), c.cfm >= 0 ? "#22c55e" : "#ef4444"], ["Equity Acumulado", fmt(rv.last.cumEquity || 0), "#60a5fa"], ["Valor Futuro", fmt(rv.last.valorAño || 0), "#c084fc"], ["Apreciación", fmt((rv.last.valorAño || 0) - precio), "#c084fc"]].map(([l, v, col]) => (
                  <div key={l} style={{ background: "#0d0d18", borderRadius: 8, padding: "10px 12px" }}><p style={{ fontSize: 9, color: "#4a4a6a", marginBottom: 4 }}>{l}</p><p style={{ fontSize: 14, fontWeight: 800, color: col }}>{v}</p></div>
                ))}
              </div>
              <div style={{ background: "#0d1a0d", border: "1px solid #22c55e30", borderRadius: 10, padding: "14px 16px" }}>
                <p style={{ fontSize: 10, color: "#5a7a5a", marginBottom: 4 }}>RETORNO TOTAL ({horizonte} años)</p>
                <p style={{ fontSize: 26, fontWeight: 900, color: "#22c55e" }}>{fmt(rv.totalReturnRenta)}</p>
                <p style={{ fontSize: 10, color: "#4a6a4a", marginTop: 4 }}>Cashflow + Equity + Apreciación</p>
              </div>
            </div>
            <div style={{ background: "#0f0f09", border: "2px solid #f59e0b40", borderRadius: 14, padding: "20px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}><span style={{ fontSize: 18 }}>💵</span><h3 style={{ fontSize: 14, fontWeight: 900, color: "#f59e0b", margin: 0 }}>VENDER EN {horizonte} AÑOS</h3></div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 14 }}>
                {[[`Valor en ${horizonte} años`, fmt(rv.last.valorAño || 0), "#c084fc"], ["Deuda Restante", fmt(rv.last.balance || 0), "#ef4444"], ["Comisión", fmt((rv.last.valorAño || 0) * comisionAgente / 100), "#ef4444"], ["Ganancia Neta Futura", fmt(rv.last.gananciaVenta || 0), (rv.last.gananciaVenta || 0) >= 0 ? "#22c55e" : "#ef4444"]].map(([l, v, col]) => (
                  <div key={l} style={{ background: "#0d0d18", borderRadius: 8, padding: "10px 12px" }}><p style={{ fontSize: 9, color: "#4a4a6a", marginBottom: 4 }}>{l}</p><p style={{ fontSize: 14, fontWeight: 800, color: col }}>{v}</p></div>
                ))}
              </div>
              <div style={{ background: "#1a1a0d", border: "1px solid #f59e0b30", borderRadius: 10, padding: "14px 16px" }}>
                <p style={{ fontSize: 10, color: "#7a7a5a", marginBottom: 4 }}>GANANCIA NETA SI VENDES EN {horizonte} AÑOS</p>
                <p style={{ fontSize: 26, fontWeight: 900, color: "#f59e0b" }}>{fmt(rv.totalReturnVenta)}</p>
              </div>
            </div>
          </div>

          <div style={{ background: "#0d0d18", border: "1px solid #1e1e2e", borderRadius: 14, overflow: "hidden" }}>
            <div style={{ padding: "13px 20px", borderBottom: "1px solid #1e1e2e" }}>
              <span style={{ fontSize: 11, color: "#b0b0d0", letterSpacing: "0.1em", textTransform: "uppercase", fontWeight: 700 }}>📅 Proyección Año por Año</span>
            </div>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                <thead>
                  <tr style={{ background: "#0a0a14" }}>
                    {["Año", "CF Acumulado", "Equity Pagado", "Valor Propiedad", "Deuda Restante", "Ganancia si Vendes", "Total Renta*"].map(h => (
                      <th key={h} style={{ padding: "10px 14px", fontSize: 9, color: "#5a5a7a", letterSpacing: "0.08em", textTransform: "uppercase", textAlign: "right", fontWeight: 700, whiteSpace: "nowrap" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {rv.yearlyData.map((row, i) => (
                    <tr key={row.yr} style={{ borderTop: "1px solid #12121e", background: i % 2 === 0 ? "#0d0d18" : "#0a0a12" }}>
                      <td style={{ padding: "9px 14px", fontSize: 12, color: "#f59e0b", fontWeight: 700, textAlign: "right" }}>{row.yr}</td>
                      <td style={{ padding: "9px 14px", fontSize: 12, color: row.cumCF >= 0 ? "#22c55e" : "#ef4444", textAlign: "right", fontFamily: "monospace" }}>{fmt(row.cumCF)}</td>
                      <td style={{ padding: "9px 14px", fontSize: 12, color: "#60a5fa", textAlign: "right", fontFamily: "monospace" }}>{fmt(row.cumEquity)}</td>
                      <td style={{ padding: "9px 14px", fontSize: 12, color: "#c084fc", textAlign: "right", fontFamily: "monospace" }}>{fmt(row.valorAño)}</td>
                      <td style={{ padding: "9px 14px", fontSize: 12, color: "#ef4444", textAlign: "right", fontFamily: "monospace" }}>{fmt(row.balance)}</td>
                      <td style={{ padding: "9px 14px", fontSize: 12, color: row.gananciaVenta >= 0 ? "#22c55e" : "#ef4444", textAlign: "right", fontFamily: "monospace", fontWeight: 700 }}>{fmt(row.gananciaVenta)}</td>
                      <td style={{ padding: "9px 14px", fontSize: 12, color: "#f59e0b", textAlign: "right", fontFamily: "monospace", fontWeight: 700 }}>{fmt(row.totalRenta)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <p style={{ padding: "8px 18px", fontSize: 9, color: "#3a3a5a" }}>* Total Renta = Cashflow + Equity + Apreciación acumulada. Proyección estimada, no garantizada.</p>
          </div>
        </div>
      )}

      {/* ══ GUARDADOS ══ */}
      {tab === "comparar" && (
        <div style={{ padding: 20 }}>
          {saved.length === 0 ? (
            <div style={{ textAlign: "center", padding: "60px 20px", color: "#3a3a5a" }}>
              <p style={{ fontSize: 36, marginBottom: 12 }}>💾</p>
              <p>No hay análisis guardados. Ingresa la data y presiona GUARDAR.</p>
            </div>
          ) : (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 12 }}>
              {saved.map((s, i) => (
                <div key={i} style={{ background: "#0d0d18", border: "1px solid #1e1e2e", borderRadius: 12, padding: "16px 18px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                    <div><p style={{ fontSize: 13, fontWeight: 800, color: "#e0e0f0" }}>{s.name}</p><p style={{ fontSize: 10, color: "#4a4a6a" }}>{s.date} · {fmt(s.precio)}</p></div>
                    <button onClick={() => setSaved(sv => sv.filter((_, j) => j !== i))} style={{ background: "none", border: "none", color: "#4a4a6a", cursor: "pointer", fontSize: 14 }}>✕</button>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 7 }}>
                    {[["Cap Rate", fmtPct(s.c.capRate), sc(s.c.capRate)], ["Cash on Cash", fmtPct(s.c.coc), sc(s.c.coc)], ["NOI/mes", fmtD(s.c.noim), "#f59e0b"], ["CF/mes", fmtD(s.c.cfm), s.c.cfm >= 0 ? "#22c55e" : "#ef4444"], ["DSCR", s.c.dscr.toFixed(2) + "x", s.c.dscr >= 1.25 ? "#22c55e" : "#ef4444"], ["Cierre", fmt(s.c.cierreDlr), "#c084fc"]].map(([l, v, col]) => (
                      <div key={l} style={{ background: "#0a0a12", borderRadius: 7, padding: "8px 10px" }}><p style={{ fontSize: 8, color: "#4a4a6a", marginBottom: 3 }}>{l}</p><p style={{ fontSize: 12, fontWeight: 800, color: col }}>{v}</p></div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ══ GUÍA PR ══ */}
      {tab === "guia" && (
        <div style={{ padding: 20, maxWidth: 880, margin: "0 auto" }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            {[["🏛️ CRIM / Contribuciones","Impuesto municipal. Varía por municipio y tasación. Exención residencia principal ~$15,000. Promedio inversión: $800-$2,500/año."],["🌀 Seguro Huracán","Esencial en PR. Temporada jun-nov. El prestamista lo requiere. Cobertura de reemplazamiento total recomendada."],["🌊 Seguro Inundación NFIP","Obligatorio en zonas FEMA. Promedio PR: $700-$2,500/año. Verifica mapa de zonas antes de comprar."],["📄 Costos de Cierre PR","3-6% financiado. Notario (1%≤$150k / 0.5% resto), registro, sellos, title insurance, tasación, origination fee, prepagados."],["🏦 Bancos Locales PR","Banco Popular, FirstBank, Oriental Bank. Promedio costos de cierre PR: $7,601 (2024). Tasas 30yr: ~6.31%."],["📊 Métricas Meta PR","Cap Rate ≥8% excelente. Cash on Cash ≥8% = meta. DSCR ≥1.25x = bancos. GRM ≤10x. Cashflow positivo = prioridad."],["🏠 Vacancia PR","5-8% áreas urbanas. 10-15% zonas rurales o turísticas. Tiempo promedio alquiler: 2-4 semanas."],["⚖️ Ley 60 / Incentivos","4% impuesto corporativo, 0% dividendos/ganancias de capital. Requiere 183 días residencia. Consulta CPA."],["🔑 Property Management","8-10% de renta bruta. Recomendado si no resides en PR. Verifica licencia con DACO."],["📐 Reglas Generales","Regla 50%: gastos operativos ~50% renta bruta. Regla 1%: renta mensual ≥1% precio compra."]].map(([title, desc]) => (
              <div key={title} style={{ background: "#0d0d18", border: "1px solid #1e1e2e", borderRadius: 12, padding: "14px 16px" }}>
                <p style={{ fontSize: 11, fontWeight: 800, color: "#f59e0b", marginBottom: 6 }}>{title}</p>
                <p style={{ fontSize: 10, color: "#6a6a8a", lineHeight: 1.7 }}>{desc}</p>
              </div>
            ))}
          </div>
          <p style={{ textAlign: "center", fontSize: 9, color: "#2a2a4a", marginTop: 16 }}>⚠ Herramienta educativa. Consulta agente licenciado, CPA y abogado antes de invertir.</p>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
