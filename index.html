<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LEGACY Uniforms – Sistema de Gestión</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f4;color:#111;}
input,select,textarea{font-family:inherit;font-size:13px;padding:6px 9px;border:0.5px solid #d1d5db;border-radius:6px;outline:none;background:#fff;color:#111;width:100%;}
input:focus,select:focus,textarea:focus{border-color:#6b7280;box-shadow:0 0 0 2px rgba(107,114,128,.12);}
input[type=checkbox]{width:auto;margin-right:5px;accent-color:#2563eb;}
button{font-family:inherit;cursor:pointer;}
@media print{.no-print{display:none!important;}body{background:#fff;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef}=React;
const SIZES=['XS','S','M','L','XL','XXL'];
const CATALOG=['Polo','T-Shirt / Camisa','Gorra','Jersey Femenino','Jersey Masculino','Hoodie','Pantalón Reversible','Falda','Leggings','Lycra','Medias','Sleeves','Otro'];
const DEF={'Polo':20,'T-Shirt / Camisa':14,'Gorra':15,'Jersey Femenino':14,'Jersey Masculino':14,'Hoodie':18,'Pantalón Reversible':27,'Falda':15,'Leggings':18,'Lycra':15,'Medias':8,'Sleeves':6,'Otro':0};
const FABRICS=['Dri-Fit','Sublimación','Algodón','Poliéster','Spandex','Mesh/Malla','French Terry','Lycra','Nylon','Otro'];
const SPORTS=['Basketball','Fútbol','Volleyball','Baseball','Softball','Tenis','Track & Field','Natación','Ciclismo','Otro'];
let _n=0;const uid=()=>++_n;
const today=()=>new Date().toISOString().split('T')[0];
const fmt=n=>'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const rf=(file,cb)=>{const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(file);};
const qtyOf=i=>SIZES.reduce((s,sz)=>s+(Number(i[sz.toLowerCase()])||0),0);

const newQI=()=>({id:uid(),name:'Polo',price:20,xs:0,s:0,m:0,l:0,xl:0,xxl:0,
  fabric:'Dri-Fit',material:'',reversible:false,audience:'Adulto',isSport:false,sport:'Basketball',deliveryDate:''});
const newOI=()=>({id:uid(),garment:'Polo',color:'',fabric:'Dri-Fit',material:'',
  xs:0,s:0,m:0,l:0,xl:0,xxl:0,productImg:null,logo:null,
  placement:'Frente pecho izquierdo',placementSize:'5 cm',notes:''});
const newOrd=()=>{const n=uid();return{id:n,
  orderNum:`ORD-${new Date().getFullYear()}-${String(n).padStart(3,'0')}`,
  client:'',date:today(),deliveryDate:'',items:[newOI()],notes:''};};

// ---- HELPERS ----
const Card=({children,style={}})=>
  <div style={{background:'#fff',borderRadius:10,border:'0.5px solid #e5e7eb',padding:'14px 16px',...style}}>{children}</div>;
const Lbl=({c})=>
  <div style={{fontSize:11,fontWeight:500,color:'#6b7280',marginBottom:4,letterSpacing:'.03em'}}>{c}</div>;
const Btn=({onClick,children,style={}})=>
  <button onClick={onClick} style={{padding:'7px 14px',borderRadius:7,border:'0.5px solid #d1d5db',background:'#fff',fontSize:13,...style}}>{children}</button>;
const Row=({children,gap=10,mb=10,cols})=>
  <div style={{display:'grid',gridTemplateColumns:cols||`repeat(${React.Children.count(children)},1fr)`,gap,marginBottom:mb}}>{children}</div>;
const Field=({label,children})=>
  <div><Lbl c={label}/>{children}</div>;
const Check=({label,checked,onChange})=>
  <label style={{display:'flex',alignItems:'center',fontSize:13,cursor:'pointer',gap:4,marginTop:16}}>
    <input type="checkbox" checked={checked} onChange={e=>onChange(e.target.checked)}/>{label}
  </label>;

function ImgUp({value,onChange,label}){
  const ref=useRef();
  return <div>
    <Lbl c={label}/>
    {value
      ?<div style={{position:'relative'}}>
        <img src={value} alt={label} style={{width:'100%',height:100,objectFit:'contain',borderRadius:7,border:'0.5px solid #e5e7eb',background:'#f9fafb',display:'block'}}/>
        <button onClick={()=>onChange(null)} style={{position:'absolute',top:4,right:4,background:'#fff',border:'0.5px solid #d1d5db',borderRadius:5,padding:'1px 7px',fontSize:11,cursor:'pointer',color:'#6b7280',lineHeight:'18px'}}>×</button>
      </div>
      :<div onClick={()=>ref.current?.click()} style={{height:100,border:'0.5px dashed #d1d5db',borderRadius:7,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer',gap:5,background:'#f9fafb'}}>
        <div style={{width:28,height:28,border:'0.5px solid #d1d5db',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:'#9ca3af',lineHeight:1}}>+</div>
        <div style={{fontSize:12,color:'#9ca3af'}}>Subir imagen</div>
        <div style={{fontSize:11,color:'#d1d5db'}}>JPG · PNG</div>
      </div>}
    <input ref={ref} type="file" accept="image/*" style={{display:'none'}} onChange={e=>{const f=e.target.files?.[0];if(f)rf(f,onChange);}}/>
  </div>;
}

// ---- WORD EXPORT ----
function exportQuoteToWord({qC,qN,qD,qDD,items}){
  const dStr=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-PR',{year:'numeric',month:'long',day:'numeric'}):'—';
  const total=i=>qtyOf(i)*(Number(i.price)||0);
  const grand=items.reduce((s,i)=>s+total(i),0);
  const rows=items.map((item,idx)=>`
    <tr style="background:${idx%2?'#f9fafb':'#fff'}">
      <td style="padding:7px 10px;border:1px solid #e5e7eb;font-weight:500">${item.name}</td>
      <td style="padding:7px 6px;border:1px solid #e5e7eb;text-align:center">${item.fabric||'—'}</td>
      <td style="padding:7px 6px;border:1px solid #e5e7eb;text-align:center">${item.audience||'—'}</td>
      <td style="padding:7px 6px;border:1px solid #e5e7eb;text-align:center">${item.isSport?item.sport:'—'}</td>
      ${SIZES.map(s=>`<td style="padding:7px 5px;border:1px solid #e5e7eb;text-align:center">${Number(item[s.toLowerCase()])||'—'}</td>`).join('')}
      <td style="padding:7px 8px;border:1px solid #e5e7eb;text-align:center;font-weight:600">${qtyOf(item)}</td>
      <td style="padding:7px 8px;border:1px solid #e5e7eb;text-align:center">${fmt(item.price)}</td>
      <td style="padding:7px 10px;border:1px solid #e5e7eb;text-align:right;font-weight:600;color:#2563eb">${fmt(total(item))}</td>
    </tr>`).join('');
  const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8"/><title>Cotización ${qN}</title>
<style>
  body{font-family:Arial,sans-serif;font-size:12pt;color:#111;}
  table{border-collapse:collapse;width:100%;}
  th{background:#1e3a5f;color:#fff;padding:7px 8px;font-size:11pt;}
  .header{display:flex;justify-content:space-between;margin-bottom:20px;}
  .company{font-size:18pt;font-weight:bold;letter-spacing:2px;}
  .quote-num{font-size:16pt;font-weight:bold;color:#2563eb;}
  .totals td{padding:5px 10px;}
  .grand{font-size:14pt;font-weight:bold;color:#2563eb;}
  .footer{margin-top:20px;font-size:9pt;color:#6b7280;border-top:1px solid #e5e7eb;padding-top:10px;}
</style></head>
<body>
<table style="margin-bottom:16px;"><tr>
  <td style="width:50%">
    <div style="background:#1e3a5f;display:inline-block;padding:6px 12px;border-radius:4px;color:#fff;font-size:18pt;font-weight:bold;letter-spacing:3px;margin-bottom:6px">L</div>
    <span style="font-size:18pt;font-weight:bold;letter-spacing:2px;margin-left:8px">LEGACY UNIFORMS</span><br/>
    <span style="font-size:9pt;color:#6b7280">787-249-0678 &nbsp;·&nbsp; santiago.emmanuel08@gmail.com</span>
  </td>
  <td style="text-align:right;vertical-align:top">
    <div style="font-size:16pt;font-weight:bold;color:#2563eb">${qN}</div>
    <div style="font-size:10pt;color:#6b7280;margin-top:3px">${dStr(qD)}</div>
  </td>
</tr></table>
<table style="margin-bottom:16px;width:auto">
  <tr><td style="font-size:9pt;color:#6b7280;padding-right:20px">Preparado para:</td><td style="font-size:13pt;font-weight:bold">${qC||'—'}</td></tr>
  <tr><td style="font-size:9pt;color:#6b7280">Fecha de entrega:</td><td style="font-size:11pt;font-weight:500">${dStr(qDD)}</td></tr>
</table>
<table style="border-collapse:collapse;width:100%;margin-bottom:16px;">
  <thead><tr>
    <th style="text-align:left;padding:7px 10px">Artículo</th>
    <th>Tela</th><th>Audiencia</th><th>Deporte</th>
    ${SIZES.map(s=>`<th>${s}</th>`).join('')}
    <th>Cant.</th><th>P.U.</th><th style="text-align:right;padding-right:10px">Total</th>
  </tr></thead>
  <tbody>${rows}</tbody>
</table>
<table style="width:260px;margin-left:auto;border-collapse:collapse;margin-bottom:20px">
  <tr><td style="padding:5px 10px;color:#6b7280;font-size:10pt">Total de piezas</td><td style="text-align:right;padding:5px 10px;font-weight:600">${items.reduce((s,i)=>s+qtyOf(i),0)}</td></tr>
  <tr style="border-top:1px solid #e5e7eb"><td style="padding:9px 10px 3px;font-size:13pt;font-weight:bold">Total general</td><td style="text-align:right;padding:9px 10px 3px;font-size:14pt;font-weight:bold;color:#2563eb">${fmt(grand)}</td></tr>
</table>
<div style="background:#f9fafb;padding:10px 12px;border-radius:6px;font-size:9pt;color:#6b7280;margin-bottom:8px">
  <b>Condiciones:</b> Precios por unidad · Cotización válida 30 días · No incluye IVU
</div>
</body></html>`;
  const blob=new Blob([html],{type:'application/msword'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`Cotizacion_${qN}.doc`;a.click();
  URL.revokeObjectURL(url);
}

function exportOrderToWord(order){
  const dStr=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-PR',{year:'numeric',month:'long',day:'numeric'}):'—';
  const pcs=order.items.reduce((s,i)=>s+qtyOf(i),0);
  const itemsHtml=order.items.map((item,idx)=>`
    <div style="margin-bottom:24px;padding-bottom:24px;${idx<order.items.length-1?'border-bottom:1px solid #e5e7eb':''}">
      <table style="width:100%;margin-bottom:10px"><tr>
        <td style="font-size:14pt;font-weight:bold">${item.garment}${item.color?` — ${item.color}`:''}</td>
        <td style="text-align:right;font-size:10pt;color:#6b7280">Tela: ${item.fabric||'—'}${item.material?` · ${item.material}`:''}</td>
      </tr></table>
      <table style="border-collapse:collapse;width:100%;margin-bottom:10px">
        <thead><tr>${SIZES.map(s=>`<th style="background:#1e3a5f;color:#fff;padding:6px 8px">${s}</th>`).join('')}<th style="background:#1e3a5f;color:#fff;padding:6px 8px">Total</th></tr></thead>
        <tbody><tr style="text-align:center">
          ${SIZES.map(s=>`<td style="padding:6px 8px;border:1px solid #e5e7eb;font-weight:${Number(item[s.toLowerCase()])>0?'bold':'normal'};color:${Number(item[s.toLowerCase()])>0?'#111':'#d1d5db'}">${Number(item[s.toLowerCase()])||'—'}</td>`).join('')}
          <td style="padding:6px 8px;border:1px solid #e5e7eb;font-weight:bold;color:#2563eb">${qtyOf(item)}</td>
        </tr></tbody>
      </table>
      <table style="width:auto"><tr>
        <td style="padding-right:24px"><div style="font-size:9pt;color:#6b7280">Ubicación del logo</div><div style="font-size:11pt">${item.placement||'—'}</div></td>
        <td><div style="font-size:9pt;color:#6b7280">Tamaño</div><div style="font-size:11pt">${item.placementSize||'—'}</div></td>
      </tr></table>
      ${item.notes?`<div style="margin-top:8px;background:#f9fafb;padding:8px 10px;border-radius:5px;font-size:10pt"><b style="color:#6b7280;font-size:9pt">Instrucciones:</b> ${item.notes}</div>`:''}
    </div>`).join('');
  const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8"/><title>Ficha ${order.orderNum}</title>
<style>body{font-family:Arial,sans-serif;font-size:12pt;color:#111;}table{border-collapse:collapse;}</style></head>
<body>
<table style="width:100%;margin-bottom:18px"><tr>
  <td><span style="font-size:18pt;font-weight:bold;letter-spacing:2px">LEGACY UNIFORMS</span><br/>
  <span style="font-size:9pt;color:#6b7280">Ficha técnica de producción</span></td>
  <td style="text-align:right;vertical-align:top">
    <div style="font-size:15pt;font-weight:bold">${order.orderNum}</div>
    <div style="font-size:12pt;font-weight:500">${order.client||'—'}</div>
    <div style="font-size:9pt;color:#6b7280">${dStr(order.date)}</div>
  </td>
</tr></table>
<table style="width:auto;margin-bottom:16px;border-collapse:collapse">
  <tr><td style="font-size:9pt;color:#6b7280;padding-right:20px;padding-bottom:5px">Fecha de entrega:</td><td style="font-size:12pt;font-weight:bold;color:#2563eb">${dStr(order.deliveryDate)}</td></tr>
  <tr><td style="font-size:9pt;color:#6b7280">Total de piezas:</td><td style="font-size:12pt;font-weight:bold">${pcs}</td></tr>
</table>
<hr style="border:0;border-top:1px solid #e5e7eb;margin-bottom:18px"/>
${itemsHtml}
${order.notes?`<div style="margin-top:16px;padding:10px 12px;background:#f9fafb;border-radius:6px"><b style="font-size:9pt;color:#6b7280">Notas generales:</b><br/>${order.notes}</div>`:''}
<div style="margin-top:20px;padding-top:10px;border-top:1px solid #e5e7eb;font-size:9pt;color:#9ca3af;display:flex;justify-content:space-between">
  <span>LEGACY Uniforms · 787-249-0678 · santiago.emmanuel08@gmail.com</span>
  <span>Total de piezas: <b>${pcs}</b></span>
</div>
</body></html>`;
  const blob=new Blob([html],{type:'application/msword'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`Orden_${order.orderNum}.doc`;a.click();
  URL.revokeObjectURL(url);
}

// ---- QUOTE VIEW ----
function QuoteView({qC,setQC,qN,setQN,qD,setQD,qDD,setQDD,items,setItem,add,del,onPrev,onExport}){
  const total=i=>qtyOf(i)*(Number(i.price)||0);
  const grand=items.reduce((s,i)=>s+total(i),0);
  const pcs=items.reduce((s,i)=>s+qtyOf(i),0);
  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
      <div>
        <div style={{fontSize:17,fontWeight:500}}>Nueva cotización</div>
        <div style={{fontSize:12,color:'#6b7280',marginTop:2}}>Artículos, tallas y especificaciones</div>
      </div>
      <div style={{display:'flex',gap:8}}>
        <Btn onClick={onExport} style={{background:'#f0fdf4',color:'#16a34a',fontWeight:500,border:'none'}}>⬇ Exportar Word</Btn>
        <Btn onClick={onPrev} style={{background:'#eff6ff',color:'#2563eb',fontWeight:500,border:'none'}}>Ver cotización →</Btn>
      </div>
    </div>

    {/* Header info */}
    <Card style={{marginBottom:12}}>
      <Row cols="1fr 150px 150px 150px" mb={0}>
        <Field label="Cliente"><input value={qC} onChange={e=>setQC(e.target.value)} placeholder="Nombre del cliente"/></Field>
        <Field label="No. cotización"><input value={qN} onChange={e=>setQN(e.target.value)}/></Field>
        <Field label="Fecha"><input type="date" value={qD} onChange={e=>setQD(e.target.value)}/></Field>
        <Field label="Fecha de entrega"><input type="date" value={qDD} onChange={e=>setQDD(e.target.value)}/></Field>
      </Row>
    </Card>

    {/* Items */}
    {items.map((item,idx)=><Card key={item.id} style={{marginBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontWeight:500,fontSize:13,color:'#374151'}}>Artículo {idx+1}</div>
        {items.length>1&&<button onClick={()=>del(item.id)} style={{fontSize:11,background:'none',border:'none',cursor:'pointer',color:'#9ca3af'}}>Eliminar</button>}
      </div>

      {/* Row 1: Nombre + precio */}
      <Row cols="180px 90px 1fr 1fr" mb={10}>
        <Field label="Artículo">
          <select value={item.name} onChange={e=>setItem(item.id,'name',e.target.value)}>{CATALOG.map(c=><option key={c}>{c}</option>)}</select>
        </Field>
        <Field label="Precio u.">
          <input type="number" value={item.price} onChange={e=>setItem(item.id,'price',e.target.value)} style={{textAlign:'center'}}/>
        </Field>
        <Field label="Tipo de tela">
          <select value={item.fabric} onChange={e=>setItem(item.id,'fabric',e.target.value)}>{FABRICS.map(f=><option key={f}>{f}</option>)}</select>
        </Field>
        <Field label="Material / detalle adicional">
          <input value={item.material} onChange={e=>setItem(item.id,'material',e.target.value)} placeholder="Ej: 100% poliéster reciclado..."/>
        </Field>
      </Row>

      {/* Row 2: Audiencia, reversible, deporte */}
      <Row cols="140px 1fr 1fr" mb={10}>
        <Field label="Audiencia">
          <select value={item.audience} onChange={e=>setItem(item.id,'audience',e.target.value)}>
            {['Adulto','Niño / Youth'].map(a=><option key={a}>{a}</option>)}
          </select>
        </Field>
        <div>
          <Lbl c="Opciones de prenda"/>
          <div style={{display:'flex',gap:20,marginTop:4}}>
            <label style={{display:'flex',alignItems:'center',gap:5,fontSize:13,cursor:'pointer'}}>
              <input type="checkbox" checked={item.reversible} onChange={e=>setItem(item.id,'reversible',e.target.checked)} style={{width:'auto'}}/> Reversible
            </label>
            <label style={{display:'flex',alignItems:'center',gap:5,fontSize:13,cursor:'pointer'}}>
              <input type="checkbox" checked={item.isSport} onChange={e=>setItem(item.id,'isSport',e.target.checked)} style={{width:'auto'}}/> Uniforme deportivo
            </label>
          </div>
        </div>
        {item.isSport&&<Field label="Deporte">
          <select value={item.sport} onChange={e=>setItem(item.id,'sport',e.target.value)}>{SPORTS.map(s=><option key={s}>{s}</option>)}</select>
        </Field>}
      </Row>

      {/* Tallas */}
      <div style={{marginBottom:8}}>
        <Lbl c="Cantidades por talla"/>
        <div style={{display:'flex',gap:7,flexWrap:'wrap',alignItems:'flex-end'}}>
          {SIZES.map(s=><div key={s} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
            <div style={{fontSize:11,fontWeight:500,color:'#6b7280'}}>{s}</div>
            <input type="number" min={0} value={item[s.toLowerCase()]} onChange={e=>setItem(item.id,s.toLowerCase(),e.target.value)} style={{width:50,textAlign:'center'}}/>
          </div>)}
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,marginLeft:6}}>
            <div style={{fontSize:11,fontWeight:500,color:'#6b7280'}}>Total</div>
            <div style={{width:50,height:34,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:600,fontSize:15,color:'#2563eb'}}>{qtyOf(item)}</div>
          </div>
          <div style={{marginLeft:8,fontSize:14,fontWeight:500,color:'#2563eb',paddingBottom:4}}>{fmt(total(item))}</div>
        </div>
      </div>
    </Card>)}

    <button onClick={add} style={{width:'100%',padding:'9px',borderRadius:10,border:'0.5px dashed #d1d5db',background:'none',fontSize:12,color:'#6b7280',cursor:'pointer',marginBottom:12}}>+ Agregar artículo</button>

    <div style={{display:'flex',justifyContent:'flex-end'}}>
      <div style={{background:'#fff',border:'0.5px solid #e5e7eb',borderRadius:10,padding:'12px 18px',minWidth:200}}>
        {[['Artículos',items.length],['Piezas',pcs]].map(([l,v])=><div key={l} style={{display:'flex',justifyContent:'space-between',gap:40,fontSize:12,color:'#6b7280',marginBottom:6}}><span>{l}</span><span style={{fontWeight:500,color:'#111'}}>{v}</span></div>)}
        <div style={{borderTop:'0.5px solid #e5e7eb',paddingTop:8,display:'flex',justifyContent:'space-between',fontSize:15,fontWeight:500}}><span>Total</span><span style={{color:'#2563eb',fontSize:17}}>{fmt(grand)}</span></div>
      </div>
    </div>
  </div>;
}

// ---- QUOTE PREVIEW ----
function QuotePrev({qC,qN,qD,qDD,items,onBack,onExport}){
  const total=i=>qtyOf(i)*(Number(i.price)||0);
  const grand=items.reduce((s,i)=>s+total(i),0);
  const pcs=items.reduce((s,i)=>s+qtyOf(i),0);
  const dStr=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-PR',{year:'numeric',month:'long',day:'numeric'}):'—';
  return <div>
    <div className="no-print" style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
      <Btn onClick={onBack}>← Editar</Btn>
      <div style={{display:'flex',gap:8}}>
        <Btn onClick={onExport} style={{background:'#f0fdf4',color:'#16a34a',fontWeight:500,border:'none'}}>⬇ Exportar Word</Btn>
        <Btn onClick={()=>window.print()} style={{fontWeight:500}}>Imprimir / PDF</Btn>

// ---- APP ROOT ----
function App(){
  const [view,setView]=useState('quote');
  const [qC,setQC]=useState('');const [qN,setQN]=useState('COT-2026-001');
  const [qD,setQD]=useState(today());const [qDD,setQDD]=useState('');
  const [qItems,setQItems]=useState([newQI()]);
  const [orders,setOrders]=useState([]);const [curOrd,setCurOrd]=useState(null);

  const setQItem=(id,f,v)=>setQItems(p=>p.map(i=>{if(i.id!==id)return i;const u={...i,[f]:v};if(f==='name')u.price=DEF[v]??0;return u;}));
  const saveOrd=()=>{if(!curOrd)return;setOrders(p=>{const idx=p.findIndex(o=>o.id===curOrd.id);if(idx>=0){const n=[...p];n[idx]=curOrd;return n;}return[...p,curOrd];});setView('logistics');setCurOrd(null);};
  const isQ=['quote','quote-prev'].includes(view);const isL=['logistics','order-form','order-prev'].includes(view);

  const exportQuote=()=>exportQuoteToWord({qC,qN,qD,qDD,items:qItems});
  const exportOrd=()=>{if(curOrd)exportOrderToWord(curOrd);};

  return <div style={{fontFamily:'system-ui,-apple-system,sans-serif',color:'#111',minHeight:600,background:'#f5f5f4'}}>
    <div className="no-print" style={{background:'#fff',borderBottom:'0.5px solid #e5e7eb',padding:'0 16px',display:'flex',alignItems:'center',justifyContent:'space-between',height:50,position:'sticky',top:0,zIndex:10}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:30,height:30,background:'#1e3a5f',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13,color:'#fff'}}>L</div>
        <div>
          <div style={{fontWeight:700,fontSize:13,letterSpacing:'.07em'}}>LEGACY UNIFORMS</div>
          <div style={{fontSize:9,color:'#9ca3af',letterSpacing:'.05em'}}>SISTEMA DE GESTIÓN</div>
        </div>
      </div>
      <nav style={{display:'flex',gap:4}}>
        {[['quote','Cotización',isQ],['logistics','Logística',isL]].map(([v,label,active])=>
          <button key={v} onClick={()=>setView(v)} style={{padding:'5px 13px',borderRadius:7,border:'0.5px solid',borderColor:active?'#9ca3af':'#e5e7eb',background:active?'#f3f4f6':'transparent',fontSize:12,fontWeight:active?500:400,cursor:'pointer',color:active?'#111':'#6b7280'}}>{label}</button>
        )}
      </nav>
    </div>
    <div style={{maxWidth:940,margin:'0 auto',padding:14}}>
      {view==='quote'&&<QuoteView qC={qC} setQC={setQC} qN={qN} setQN={setQN} qD={qD} setQD={setQD} qDD={qDD} setQDD={setQDD} items={qItems} setItem={setQItem} add={()=>setQItems(p=>[...p,newQI()])} del={id=>setQItems(p=>p.filter(i=>i.id!==id))} onPrev={()=>setView('quote-prev')} onExport={exportQuote}/>}
      {view==='quote-prev'&&<QuotePrev qC={qC} qN={qN} qD={qD} qDD={qDD} items={qItems} onBack={()=>setView('quote')} onExport={exportQuote}/>}
      {view==='logistics'&&<LogList orders={orders} onNew={()=>{setCurOrd(newOrd());setView('order-form');}} onEdit={o=>{setCurOrd(JSON.parse(JSON.stringify(o)));setView('order-form');}} onDel={id=>setOrders(p=>p.filter(o=>o.id!==id))} onView={o=>{setCurOrd(o);setView('order-prev');}}/>}
      {view==='order-form'&&curOrd&&<OrderForm order={curOrd} setCO={setCurOrd} onSave={saveOrd} onCancel={()=>{setView('logistics');setCurOrd(null);}}/>}
      {view==='order-prev'&&curOrd&&<OrderPrev order={curOrd} onBack={()=>setView('logistics')} onExport={exportOrd}/>}
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
